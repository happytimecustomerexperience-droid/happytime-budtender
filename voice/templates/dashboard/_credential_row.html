{% load static %}
<tr id="cred-row-{{ c.name }}" data-testid="cred-row-{{ c.name }}">
  <td>
    <strong>{{ c.label }}</strong><br>
    <code class="muted" style="font-size:11px">{{ c.name }}</code>
    {% if c.help %}<div class="muted" style="font-size:12px;margin-top:2px">{{ c.help }}</div>{% endif %}
  </td>
  <td style="white-space:nowrap">
    {% if c.is_set %}<span class="badge green">set</span>
      {% if c.preview %}<code style="font-size:12px">{{ c.preview }}</code>{% endif %}
    {% else %}<span class="badge slate">not set</span>{% endif %}
  </td>
  <td>
    <form hx-post="{% url 'dash-credentials-save' %}" hx-target="#cred-row-{{ c.name }}" hx-swap="outerHTML" class="row" style="gap:6px">
      {% csrf_token %}
      <input type="hidden" name="name" value="{{ c.name }}">
      <input type="{% if c.secret %}password{% else %}text{% endif %}" name="value" placeholder="{% if c.is_set %}leave blank to keep{% else %}enter value{% endif %}" autocomplete="off" style="flex:1">
      <button class="btn btn-primary" type="submit" data-testid="cred-save-{{ c.name }}">Save</button>
    </form>
    {% if saved %}<div class="note-green" style="margin-top:4px">Saved — applied live.</div>{% endif %}
  </td>
</tr>
