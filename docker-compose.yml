# Happy Time — single-VPS stack for BOTH services in this repo:
#   • budtender  (this repo root)  — suggestions/pairing API + admin/analytics
#   • voice      (./voice)         — Vapi Squad control plane (calls budtender)
#
# They run as INDEPENDENT containers with their OWN databases. Bring everything
# up with a single command:
#     docker compose up -d --build --remove-orphans
# Async voice post-call queue is opt-in:
#     docker compose --profile voice-async up -d --build
#
# INGRESS = the existing host-mode Traefik (`traefik-a0hc`) already on this VPS.
# It reads Docker labels over the socket and reaches containers by bridge IP, so
# NO ports are published here. Only `voice-web` is exposed publicly (Traefik
# labels below) at voice.happytimeweed.com via Let's Encrypt — mirrors how
# nordland/n8n are served. budtender stays INTERNAL: voice calls it in-cluster at
# http://budtender.internal:8000. To expose the budtender API publicly later (for
# the website), add the same label block to `web` with its own host + A-record.
services:
  # ─────────────────────────── BUDTENDER STACK ────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${SQL_DATABASE:-budtender}
      POSTGRES_USER: ${SQL_USER:-budtender}
      POSTGRES_PASSWORD: ${SQL_PASSWORD:-change-me}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER:-budtender}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    # Apply the committed migrations. --fake-initial records 0001_initial as
    # applied when its tables already exist (existing prod/dev DBs) instead of
    # trying to recreate them, so the analytics tables are stored durably and
    # deterministically. No runtime makemigrations (that was ephemeral/fragile).
    command: sh -c "python manage.py migrate --noinput --fake-initial"
    env_file:
      - .env
      - .env.dutchie
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    # Warm the questionnaire facet cache BEFORE serving, so the steps are instant
    # on the very first request after a `docker compose up`/restart (Redis is
    # flushed on restart; warming only-on-sync left a cold window). `|| true` keeps
    # a warm hiccup from blocking startup; `exec` hands PID 1 to gunicorn.
    command: sh -c "python manage.py warm_facets || true; exec gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-5} --worker-class gthread --threads ${GUNICORN_THREADS:-4} --timeout 60 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100"
    env_file:
      - .env
      - .env.dutchie
    expose:
      - "8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/api/v1/health/')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      default:
        # In-cluster alias so voice reaches budtender at http://budtender.internal:8000.
        # `budtender.internal` is already in budtender's ALLOWED_HOSTS (.env.example),
        # so the Host header is accepted under DEBUG=0 — no 400. Still reachable as `web` too.
        aliases:
          - budtender.internal

  celery-worker:
    build: .
    command: celery -A core worker -l info --concurrency 2
    env_file:
      - .env
      - .env.dutchie
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  celery-beat:
    build: .
    command: celery -A core beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
      - .env.dutchie
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ───────────────────────────── VOICE STACK ──────────────────────────────
  # Independent Django control plane (build context ./voice). Owns its OWN
  # Postgres (voice-db). Reaches budtender in-cluster at http://web:8000 using
  # the shared HHT_BACKEND_TOKEN. Secrets/keys come from ./voice/.env.
  voice-db:
    image: postgres:16
    # Pulls POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD from voice/.env so
    # they ALWAYS match what voice-web connects with. Change them in voice/.env.
    env_file:
      - ./voice/.env
    volumes:
      - voice_pgdata:/var/lib/postgresql/data
    healthcheck:
      # Uses the container's OWN POSTGRES_USER (loaded from voice/.env), so it
      # stays correct even if you change the DB user. ($$ -> a literal $ so the
      # in-container shell expands it, not docker-compose.)
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  voice-web:
    build:
      context: ./voice
    env_file:
      - ./voice/.env
    environment:
      # Structural/integration values FORCED for the merged stack, regardless of
      # what voice/.env says (mirrors voice/docker-compose.prod.yaml intent):
      POSTGRES_HOST: voice-db                  # talk to the voice DB container
      DJANGO_DEBUG: "0"                        # prod hardening + fail-closed guard
      HTTPS_ENABLED: "1"                       # HSTS + secure cookies (behind tunnel TLS)
      HHT_BUDTENDER_BASE_URL: http://budtender.internal:8000  # budtender, in-cluster (no tunnel hop)
    depends_on:
      voice-db:
        condition: service_healthy
    volumes:
      - ./voice/data/uploads:/app/data/uploads   # uploaded KB files (persist)
      - ./voice/secrets:/app/secrets:ro          # Vertex service-account JSON (optional)
    expose:
      - "8000"
    restart: unless-stopped
    # Served publicly by the host-mode traefik-a0hc (Let's Encrypt). Mirrors the
    # working nordland labels. Traefik reaches this container by its IP on
    # happytime-budtender_default, so no published ports are needed.
    labels:
      - traefik.enable=true
      - traefik.docker.network=happytime-budtender_default
      - traefik.http.routers.voice.rule=Host(`voice.happytimeweed.com`)
      - traefik.http.routers.voice.entrypoints=web
      - traefik.http.routers.voice.tls=true
      - traefik.http.routers.voice.tls.certresolver=letsencrypt
      - traefik.http.services.voice.loadbalancer.server.port=8000
    healthcheck:
      # Pure liveness — is gunicorn accepting connections? Intentionally NOT
      # /healthz, which returns 503 until the OPTIONAL Gemini/Vapi deps are
      # configured (that would falsely flag a working FAQ/suggestions agent).
      test: ["CMD-SHELL", "python -c \"import socket; socket.create_connection(('localhost',8000),3).close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers ${VOICE_GUNICORN_WORKERS:-2} --timeout 120"

  # Optional voice post-call queue (Gemini summary + staff email off the webhook
  # turn). OFF by default — voice runs fine without it (work degrades to inline).
  # Enable: set HHT_USE_CELERY=1 in voice/.env, then
  #     docker compose --profile voice-async up -d --build
  voice-redis:
    image: redis:7-alpine
    profiles: ["voice-async"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  voice-worker:
    build:
      context: ./voice
    profiles: ["voice-async"]
    env_file:
      - ./voice/.env
    environment:
      POSTGRES_HOST: voice-db
      DJANGO_DEBUG: "0"
      HHT_USE_CELERY: "1"
      CELERY_BROKER_URL: redis://voice-redis:6379/0
    depends_on:
      voice-db:
        condition: service_healthy
      voice-redis:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "celery -A core worker --loglevel=info --concurrency=${VOICE_CELERY_CONCURRENCY:-2}"

  # NOTE: no `cloudflared` service — ingress is the host-mode traefik-a0hc that
  # already runs on this VPS (see voice-web labels). Cloudflare is not used.

volumes:
  pgdata:
  voice_pgdata:
